  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0f172a; /* গাঢ় নীল ব্যাকগ্রাউন্ড */
      background-image: 
        radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.2) 0, transparent 50%), 
        radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.2) 0, transparent 50%),
        url('https://i.ibb.co/vx7yLFwh/photo-2026-03-23-21-08-55-7620561070293254176.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      min-height: 100vh;
    }

    /* প্রিমিয়াম মারকুই */
    .promo-bar {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 0;
      overflow: hidden;
    }

    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      animation: marquee-scroll 20s linear infinite;
    }

    @keyframes marquee-scroll {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100%); }
    }

    /* মেইন কার্ড ডিজাইন */
    .main-card {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* বাটন এনিমেশন */
    .link-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .link-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-5px);
      border-color: #3b82f6;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    .link-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-btn:hover::after {
      opacity: 1;
    }

    /* নিওন টেক্সট */
    .neon-text {
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
    }
  </style>
</head>

  <script>

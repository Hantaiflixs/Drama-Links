<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxe Drama | Premium Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 90px; }
    #bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); z-index: -1; transition: 1s; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 25px; margin-bottom: 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
    
    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; padding: 15px 0; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; color: #666; text-decoration: none; transition: 0.3s; }
    .nav-item.active { color: #3b82f6; }
    
    /* Admin UI */
    .admin-panel { display: none; background: #111; padding: 25px; border-radius: 25px; width: 95%; max-width: 550px; border: 1px solid #333; z-index: 200; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); max-height: 85vh; overflow-y: auto; box-shadow: 0 0 100px rgba(0,0,0,1); }
    input, select { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; font-size: 14px; }
    .field-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); position: relative; }
    .watch-btn { background: linear-gradient(90deg, #1e40af, #7e22ce); font-weight: 900; transition: 0.3s; }
    .watch-btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="flex flex-col items-center p-4">

  <div id="bg-blur"></div>

  <div id="main-hub" class="w-full max-w-md pt-4">
      </div>

  <div class="bottom-nav">
    <a href="#" class="nav-item active"><i data-lucide="home"></i><span>HOME</span></a>
    <a href="https://t.me/+anI2lp863iYzODM1" class="nav-item"><i data-lucide="send"></i><span>TELEGRAM</span></a>
    <a href="#" onclick="showLogin()" class="nav-item"><i data-lucide="shield-check"></i><span>ADMIN</span></a>
  </div>

  <div id="admin-login" class="admin-panel text-center">
    <h2 class="text-xl font-bold mb-6 text-blue-500 uppercase tracking-widest">Secure Access</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="handleLogin()" class="bg-blue-600 w-full py-4 rounded-xl font-bold mt-2 shadow-lg">LOGIN</button>
    <button onclick="closePanels()" class="mt-4 text-xs text-gray-500 uppercase">Cancel</button>
  </div>

  <div id="admin-dash" class="admin-panel">
    <h2 class="text-xl font-bold mb-6 text-center text-green-500 uppercase tracking-widest">Manage Content</h2>
    <div id="card-list">
        </div>
    
    <div class="sticky bottom-0 bg-[#111] pt-4 space-y-2 border-t border-white/10">
        <button onclick="addNewField()" class="bg-blue-600 w-full py-3 rounded-xl font-black text-sm uppercase">+ Add New Drama</button>
        <button onclick="saveAll()" class="bg-green-600 w-full py-4 rounded-xl font-black uppercase tracking-wider">Save All Changes</button>
        <button onclick="closePanels()" class="w-full text-xs text-red-500 py-2 font-bold">CLOSE</button>
    </div>
  </div>

  <script>
    const API_KEY = 'e6449037b5c9edb30f0e4b92c3789429';
    let fieldId = 0;

    function init() {
      const data = JSON.parse(localStorage.getItem('dramaHub')) || [{id: '136732', type: 'tv', audio: 'hindi', msub: true, link: '#'}];
      const hub = document.getElementById('main-hub');
      hub.innerHTML = '';
      
      data.forEach((card, i) => {
        if(card.id) fetchCard(card, i);
      });
      lucide.createIcons();
    }

    async function fetchCard(card, index) {
      let url = `https://api.themoviedb.org/3/${card.type}/${card.id}?api_key=${API_KEY}&language=en-US`;
      if(card.id.startsWith('tt')) url = `https://api.themoviedb.org/3/find/${card.id}?api_key=${API_KEY}&external_source=imdb_id&language=en-US`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        let final = card.id.startsWith('tt') ? (card.type === 'tv' ? data.tv_results[0] : data.movie_results[0]) : data;

        if(!final) return;
        if(index === 0) document.getElementById('bg-blur').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${final.backdrop_path})`;

        const hub = document.getElementById('main-hub');
        hub.innerHTML += `
          <div class="glass-card text-center">
            <img src="https://image.tmdb.org/t/p/w500${final.poster_path}" class="w-44 h-64 mx-auto rounded-[30px] mb-5 object-cover shadow-2xl border border-white/10">
            <h2 class="text-2xl font-black uppercase mb-1 leading-tight tracking-tighter">${final.name || final.title}</h2>
            <div class="flex justify-center gap-2 mb-4 items-center">
               <span class="text-[10px] bg-yellow-500 text-black px-2 py-0.5 rounded font-black tracking-tighter">⭐ ${final.vote_average.toFixed(1)}</span>
               <span class="text-[10px] ${card.audio === 'hindi' ? 'bg-red-600' : 'bg-gray-700'} text-white px-2 py-0.5 rounded font-black uppercase">${card.audio === 'hindi' ? 'Hindi Dubbed' : 'Original Audio'}</span>
               ${card.msub ? '<span class="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded font-black uppercase">MSub</span>' : ''}
            </div>
            <p class="text-gray-400 text-xs mb-6 line-clamp-3 italic px-2">${final.overview || "No summary available."}</p>
            <a href="${card.link}" class="watch-btn block w-full py-5 rounded-[22px] font-black uppercase tracking-widest text-white shadow-xl">🚀 Watch Now</a>
          </div>
        `;
      } catch(e) { console.log(e); }
    }

    function showLogin() { document.getElementById('admin-login').style.display = 'block'; }
    function closePanels() { location.reload(); }

    function handleLogin() {
      if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'admin123') {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-dash').style.display = 'block';
        loadAdminFields();
      } else { alert('Access Denied'); }
    }

    function loadAdminFields() {
      const list = document.getElementById('card-list');
      list.innerHTML = '';
      const data = JSON.parse(localStorage.getItem('dramaHub')) || [];
      data.forEach(card => addNewField(card));
      if(data.length === 0) addNewField();
    }

    function addNewField(card = {id: '', type: 'tv', audio: 'hindi', msub: false, link: ''}) {
      const list = document.getElementById('card-list');
      const id = fieldId++;
      const div = document.createElement('div');
      div.className = "field-box text-left";
      div.id = `box-${id}`;
      div.innerHTML = `
        <button onclick="removeBox(${id})" class="absolute top-3 right-3 text-red-500 font-bold bg-black/20 w-6 h-6 rounded-full flex items-center justify-center">✕</button>
        
        <label class="text-[10px] text-gray-400 uppercase font-bold ml-1">TMDB/IMDB ID</label>
        <input type="text" class="c-id" placeholder="e.g. 136732" value="${card.id}">
        
        <label class="text-[10px] text-gray-400 uppercase font-bold ml-1">Watch Link (Telegram/URL)</label>
        <input type="text" class="c-link" placeholder="Paste link here" value="${card.link || ''}">

        <div class="flex gap-2">
            <div class="w-1/2">
                <label class="text-[10px] text-gray-400 uppercase font-bold ml-1">Category</label>
                <select class="c-type">
                    <option value="tv" ${card.type==='tv'?'selected':''}>TV Series</option>
                    <option value="movie" ${card.type==='movie'?'selected':''}>Movie</option>
                </select>
            </div>
            <div class="w-1/2">
                <label class="text-[10px] text-gray-400 uppercase font-bold ml-1">Audio Language</label>
                <select class="c-audio">
                    <option value="hindi" ${card.audio==='hindi'?'selected':''}>Hindi Dubbed</option>
                    <option value="original" ${card.audio==='original'?'selected':''}>Original Audio</option>
                </select>
            </div>
        </div>
        
        <div class="flex items-center gap-2 mt-1">
            <input type="checkbox" class="c-msub w-4 h-4" ${card.msub?'checked':''}>
            <label class="text-[11px] font-bold uppercase text-blue-300">Include MSub / Subtitle</label>
        </div>
      `;
      list.appendChild(div);
    }

    function removeBox(id) { document.getElementById(`box-${id}`).remove(); }

    function saveAll() {
      const boxes = document.querySelectorAll('.field-box');
      const newCards = [];
      boxes.forEach(box => {
        const id = box.querySelector('.c-id').value.trim();
        if(id) {
          newCards.push({
            id: id,
            type: box.querySelector('.c-type').value,
            audio: box.querySelector('.c-audio').value,
            link: box.querySelector('.c-link').value,
            msub: box.querySelector('.c-msub').checked
          });
        }
      });
      localStorage.setItem('dramaHub', JSON.stringify(newCards));
      alert('Hub Updated Successfully!');
      location.reload();
    }

    init();
  </script>
</body>
</html>
